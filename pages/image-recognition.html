<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Recognition - Aqua Insight</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/image-recognition.css">
</head>

<body class="ir-page">

  <!-- ===== TOPBAR ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-group">
        <div class="logo-icon">IR</div>
        <div>
          <h1>Aqua Insight</h1>
          <p>Image Recognition Module</p>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <button class="topbar-button" onclick="location.href='../index.html'">
        Home
      </button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="ir-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="ir-sidebar">

      <!-- Upload -->
      <div class="ir-section">
        <h3>Upload</h3>

        <button id="uploadReferenceBtn" class="primary-button">
          Upload Reference
        </button>

        <input type="file" id="referenceInput" hidden>

        <button id="uploadTargetBtn" class="secondary-button">
          Upload Target / Batch
        </button>

        <input type="file" id="targetInput" multiple hidden>
      </div>

      <!-- Category -->
      <div class="ir-section">
        <h3>Categories</h3>

        <div id="categoryList"></div>

        <button id="addCategoryBtn" class="secondary-button">
          + Add Category
        </button>
      </div>

      <!-- Control -->
      <div class="ir-section">
        <h3>Detection</h3>

        <label>Threshold</label>
        <input type="range" id="thresholdSlider" min="0" max="100" value="70">

        <button id="runDetectionBtn" class="primary-button">
          Run Detection
        </button>
      </div>

    </aside>

    <!-- ===== CONTENT ===== -->
    <main class="ir-content">

      <!-- Canvas Area -->
      <div class="ir-canvas-grid">

        <div class="ir-canvas-card">
          <h4>Reference</h4>
          <canvas id="referenceCanvas"></canvas>
        </div>

        <div class="ir-canvas-card">
          <h4>Target</h4>
          <canvas id="targetCanvas"></canvas>
        </div>

        <div class="ir-canvas-card">
          <h4>Result</h4>
          <canvas id="resultCanvas"></canvas>
        </div>

      </div>

      <!-- Result Table -->
      <div class="ir-table-section">
        <h3>Results</h3>

        <table id="resultTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Category</th>
              <th>Confidence</th>
              <th>Area</th>
              <th>Circularity</th>
            </tr>
          </thead>

          <tbody id="resultTableBody">
            <tr>
              <td colspan="5">No data</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="../js/image-recognition.js"></script>

</body>
</html>
