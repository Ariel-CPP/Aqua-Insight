<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aqua Insight — Image Recognition</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/image-recognition.css">

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="ir-container">

  <!-- =========================
       SIDEBAR
  ========================== -->
  <div class="ir-sidebar">

    <h2>Image Recognition</h2>

    <!-- Upload -->
    <div class="card">
      <h3>Input</h3>

      <input type="file" id="referenceInput" accept="image/*" hidden>
      <button onclick="referenceInput.click()">Upload Reference</button>

      <input type="file" id="targetInput" accept="image/*" multiple hidden>
      <button onclick="targetInput.click()">Upload Target (Batch)</button>
    </div>

    <!-- Category -->
    <div class="card">
      <h3>Category</h3>

      <div id="categoryList"></div>

      <button onclick="addCategory()">+ Add Category</button>
    </div>

    <!-- Control -->
    <div class="card">
      <h3>Control</h3>

      <label>Threshold</label>
      <input type="range" id="thresholdSlider" min="0" max="100" value="60">

      <button onclick="runDetection()">Run Detection</button>
    </div>

    <!-- Export -->
    <div class="card">
      <h3>Export</h3>

      <button onclick="exportResultsCSV()">Export CSV</button>
      <button onclick="exportResultsXLSX()">Export XLSX</button>

      <button onclick="exportAdaptiveJSON()">Export Model</button>

      <input type="file" id="importModel" hidden>
      <button onclick="importModel.click()">Import Model</button>
    </div>

  </div>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <div class="ir-main">

    <div class="canvas-grid">

      <!-- Reference -->
      <div class="canvas-card">
        <h4>Reference (Draw Polygon)</h4>
        <div class="canvas-wrapper">
          <canvas id="referenceCanvas"></canvas>
        </div>
      </div>

      <!-- Target -->
      <div class="canvas-card">
        <h4>Target Image</h4>
        <div class="canvas-wrapper">
          <canvas id="targetCanvas"></canvas>
        </div>
      </div>

      <!-- Result -->
      <div class="canvas-card">
        <h4>Detection Result</h4>
        <div class="canvas-wrapper">
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>

    </div>

    <!-- =========================
         TABLE
    ========================== -->
    <div class="result-table">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Category</th>
            <th>Area</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody id="resultTableBody">
          <tr>
            <td colspan="4">No data</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script src="../js/image-recognition.js"></script>

</body>
</html>
