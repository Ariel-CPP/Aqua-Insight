<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Recognition - Aqua Insight</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/image-recognition.css">
</head>

<body class="ir-page">
  <!-- Topbar (reuse global) -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-group">
        <div class="logo-icon">IR</div>
        <div>
          <h1>Aqua Insight</h1>
          <p>Image Recognition</p>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <button class="topbar-button" onclick="window.location.href='../index.html'">
        Back
      </button>
    </div>
  </header>

  <div class="ir-layout">

    <!-- SIDEBAR -->
    <aside class="ir-sidebar">

      <div class="sidebar-section">
        <h3>Upload</h3>

        <button id="uploadReferenceBtn" class="analysis-button">
          Upload Reference
        </button>
        <input type="file" id="referenceInput" hidden>

        <button id="uploadTargetBtn" class="secondary-analysis-button">
          Upload Target
        </button>
        <input type="file" id="targetInput" hidden>
      </div>

      <div class="sidebar-section">
        <h3>Categories</h3>

        <div id="categoryList"></div>

        <button id="addCategoryBtn" class="analysis-button">
          Add Category
        </button>
      </div>

      <div class="sidebar-section">
        <h3>Controls</h3>

        <label>Threshold</label>
        <input type="range" id="thresholdSlider" min="0" max="100" value="50">

        <button id="runDetectionBtn" class="analysis-button">
          Run Detection
        </button>
      </div>

    </aside>

    <!-- MAIN -->
    <main class="ir-content">

      <!-- CANVAS AREA -->
      <div class="canvas-grid">

        <div class="canvas-card">
          <h3>Reference</h3>
          <div class="canvas-wrapper">
            <canvas id="referenceCanvas"></canvas>
            <div class="crosshair"></div>
          </div>
        </div>

        <div class="canvas-card">
          <h3>Target</h3>
          <div class="canvas-wrapper">
            <canvas id="targetCanvas"></canvas>
            <div class="crosshair"></div>
          </div>
        </div>

      </div>

      <!-- RESULT CANVAS -->
      <div class="canvas-card">
        <h3>Detection Result</h3>
        <div class="canvas-wrapper">
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>

      <!-- TABLE -->
      <div class="result-table">
        <h3>Results</h3>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Category</th>
              <th>Area</th>
              <th>Circularity</th>
              <th>Confidence</th>
            </tr>
          </thead>

          <tbody id="resultTableBody">
            <tr>
              <td colspan="5">No data</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="../js/image-recognition.js"></script>
</body>
</html>
